<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Golf Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09100c;--surface:#111c14;--s2:#162019;--s3:#1d2a20;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --gold:#c9a84c;--gl:#e4c96a;--gd:rgba(201,168,76,0.14);
  --green:#4ade80;--grd:rgba(74,222,128,0.12);
  --red:#f87171;--rdd:rgba(248,113,113,0.12);
  --blue:#60a5fa;--bld:rgba(96,165,250,0.12);
  --text:#e4e8e0;--dim:#6b7d6e;--mid:#9aab9d;
  --fd:'Playfair Display',serif;--fb:'DM Sans',sans-serif;
  --r:14px;--r2:20px;--tr:.2s cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);font-size:15px;line-height:1.5;overflow-x:hidden}
input,select,button,textarea{font-family:var(--fb)}
button{cursor:pointer}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
#app-loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
#app-loading .spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
#app-loading p{color:var(--dim);font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 90% 55% at 50% 0%,#1b3d28,#09100c 65%);padding:24px}
.auth-card{background:var(--surface);border:1px solid var(--border2);border-radius:28px;padding:48px 42px;width:100%;max-width:460px;box-shadow:0 40px 100px rgba(0,0,0,.65);animation:fadeUp .5s ease both}
.auth-brand{text-align:center;margin-bottom:36px}
.auth-brand-icon{font-size:48px;display:block;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(201,168,76,.4))}
.auth-brand h1{font-family:var(--fd);font-size:28px;color:var(--gold)}
.auth-brand p{color:var(--dim);font-size:13px;margin-top:5px}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:12px;padding:5px;margin-bottom:28px}
.auth-tab{flex:1;background:transparent;border:none;color:var(--dim);font-size:14px;font-weight:500;padding:9px;border-radius:8px;transition:all var(--tr)}
.auth-tab.active{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.err-box{background:var(--rdd);border:1px solid rgba(248,113,113,.25);color:var(--red);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;text-align:center}
.err-box.show{display:block}
.ok-box{background:var(--grd);border:1px solid rgba(74,222,128,.25);color:var(--green);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;text-align:center}
.ok-box.show{display:block}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:13px 16px;color:var(--text);font-size:15px;outline:none;transition:border-color var(--tr)}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field select option{background:var(--surface)}
.role-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.role-btn{background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all var(--tr);color:var(--dim)}
.role-btn.sel{border-color:var(--gold);background:var(--gd);color:var(--gold)}
.role-btn .role-icon{font-size:28px;margin-bottom:6px}
.role-btn .role-name{font-size:13px;font-weight:600}
.btn-auth{width:100%;background:linear-gradient(135deg,var(--gold),var(--gl));color:#08100b;font-weight:700;font-size:15px;border:none;border-radius:11px;padding:15px;letter-spacing:.4px;transition:all var(--tr);box-shadow:0 4px 24px rgba(201,168,76,.3);margin-top:8px}
.btn-auth:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,168,76,.4)}
.btn-auth:disabled{opacity:.6;transform:none;cursor:not-allowed}
.auth-switch{text-align:center;margin-top:22px;font-size:13px;color:var(--dim)}
.auth-switch a{color:var(--gold);cursor:pointer;text-decoration:underline}
.app{display:none;min-height:100vh;flex-direction:column}
.app.active{display:flex}
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 16px;gap:4px;position:sticky;top:66px;height:calc(100vh - 66px);overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;cursor:pointer;color:var(--mid);font-size:14px;font-weight:500;transition:all var(--tr);border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{background:var(--s2);color:var(--text)}
.nav-item.active{background:var(--gd);color:var(--gold);font-weight:600}
.nav-item .nav-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.topbar{height:66px;background:rgba(9,16,12,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;animation:slideDown .4s ease}
.topbar-brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.topbar-brand-icon{font-size:22px;filter:drop-shadow(0 0 8px rgba(201,168,76,.5))}
.topbar-brand-name{font-family:var(--fd);font-size:19px;color:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-name{font-size:14px;font-weight:500;color:var(--mid)}
.badge{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;letter-spacing:.4px}
.badge-coach{background:rgba(201,168,76,.18);color:var(--gold)}
.badge-student{background:var(--grd);color:var(--green)}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;transition:all var(--tr)}
.btn-logout:hover{border-color:var(--red);color:var(--red);background:var(--rdd)}
.content{flex:1;padding:32px;overflow-y:auto;min-width:0}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:24px 20px;text-align:center;position:relative;overflow:hidden;transition:transform var(--tr),border-color var(--tr);animation:fadeUp .4s ease both}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
.stat-card:hover{transform:translateY(-3px);border-color:rgba(201,168,76,.25)}
.stat-val{font-family:var(--fd);font-size:36px;font-weight:700;color:var(--gold);line-height:1}
.stat-label{font-size:12px;color:var(--dim);margin-top:6px;font-weight:500}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.page-hdr h2{font-family:var(--fd);font-size:24px}
.page-hdr p{font-size:13px;color:var(--dim);margin-top:3px}
.btn{border:none;border-radius:10px;cursor:pointer;font-weight:600;font-size:14px;padding:11px 20px;transition:all var(--tr);display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gl));color:#08100b;box-shadow:0 4px 16px rgba(201,168,76,.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(201,168,76,.35)}
.btn-danger{background:var(--rdd);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.btn-danger:hover{background:rgba(248,113,113,.2)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--dim)}
.btn-ghost:hover{border-color:var(--mid);color:var(--text)}
.btn-sm{font-size:12px;padding:7px 14px;border-radius:8px}
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.fchip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 15px;font-size:13px;cursor:pointer;color:var(--dim);transition:all var(--tr)}
.fchip.active{border-color:var(--gold);color:var(--gold);background:var(--gd)}
.fchip:hover:not(.active){color:var(--text);border-color:var(--border2)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
.contract-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:transform var(--tr),box-shadow var(--tr),border-color var(--tr);animation:fadeUp .35s ease both}
.contract-card:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.45);border-color:rgba(201,168,76,.2)}
.cc-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 20px 16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--s2),var(--surface))}
.cc-lbl{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.cc-name{font-family:var(--fd);font-size:18px;line-height:1.2}
.cc-sub{font-size:12px;color:var(--dim);margin-top:3px}
.status-pill{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;letter-spacing:.3px;white-space:nowrap;margin-top:2px}
.cc-body{padding:20px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.info-label{font-size:11px;color:var(--dim);margin-bottom:4px;letter-spacing:.4px}
.info-val{font-size:15px;font-weight:600}
.prog-track{background:rgba(255,255,255,.07);border-radius:99px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gl));transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-labels{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--dim)}
.cc-actions{display:flex;gap:8px;margin-top:14px}
.lesson-list{display:flex;flex-direction:column;gap:10px}
.lesson-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px 20px;display:flex;align-items:center;gap:14px;transition:border-color var(--tr);animation:fadeUp .3s ease both}
.lesson-row:hover{border-color:rgba(201,168,76,.2)}
.lesson-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lesson-date{font-size:13px;color:var(--dim);min-width:96px;font-weight:500}
.lesson-info{flex:1;min-width:0}
.lesson-topic{font-size:15px;font-weight:500}
.lesson-note{font-size:12px;color:var(--dim);margin-top:2px}
.lesson-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.att-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.att-p{background:var(--grd);color:var(--green)}
.att-a{background:var(--rdd);color:var(--red)}
.stag{font-size:11px;color:var(--dim)}
.student-table{width:100%;border-collapse:separate;border-spacing:0 8px}
.student-table thead th{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);padding:0 16px 8px;text-align:left}
.student-table tbody tr{background:var(--surface);border-radius:12px;transition:all var(--tr);cursor:pointer;animation:fadeUp .3s ease both}
.student-table tbody td{padding:16px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.student-table tbody td:first-child{border-left:1px solid var(--border);border-radius:12px 0 0 12px}
.student-table tbody td:last-child{border-right:1px solid var(--border);border-radius:0 12px 12px 0}
.student-table tbody tr:hover td{border-color:rgba(201,168,76,.2)}
.s-avatar{width:40px;height:40px;border-radius:10px;background:var(--grd);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:17px;color:var(--green);font-weight:700;border:1px solid rgba(74,222,128,.2)}
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:28px}
.detail-back{display:flex;align-items:center;gap:8px;color:var(--dim);cursor:pointer;font-size:13px;margin-bottom:24px;transition:color var(--tr)}
.detail-back:hover{color:var(--gold)}
.detail-profile{display:flex;align-items:center;gap:20px;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.detail-avatar{width:64px;height:64px;border-radius:16px;background:var(--grd);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:28px;color:var(--green);font-weight:700;border:2px solid rgba(74,222,128,.2);flex-shrink:0}
.detail-info h3{font-family:var(--fd);font-size:22px}
.detail-info p{font-size:13px;color:var(--dim);margin-top:4px}
.detail-stats{display:flex;gap:24px;margin-bottom:28px}
.ds-item{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:16px 22px;text-align:center;flex:1}
.ds-val{font-family:var(--fd);font-size:28px;color:var(--gold);line-height:1}
.ds-lbl{font-size:11px;color:var(--dim);margin-top:4px}
.empty{text-align:center;padding:60px 24px;color:var(--dim)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-text{font-size:15px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .2s ease}
.modal{background:var(--surface);border:1px solid rgba(201,168,76,.2);border-radius:22px;padding:34px 34px 30px;width:100%;max-width:500px;animation:fadeUp .3s ease;max-height:90vh;overflow-y:auto}
.modal h2{font-family:var(--fd);font-size:22px;color:var(--gold);margin-bottom:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-actions{display:flex;gap:10px;margin-top:26px}
.modal-actions .btn{flex:1;justify-content:center}
.confirm-modal{max-width:380px;text-align:center}
.confirm-modal .confirm-icon{font-size:44px;margin-bottom:16px}
.confirm-modal p{color:var(--mid);font-size:14px;margin-bottom:6px}
#toast{position:fixed;bottom:28px;right:28px;z-index:999;background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:13px 20px;font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;max-width:320px}
#toast.show{display:block;animation:slideUp .3s ease}
#toast.t-ok{border-color:rgba(74,222,128,.3);color:var(--green)}
#toast.t-err{border-color:rgba(248,113,113,.3);color:var(--red)}
#toast.t-info{border-color:rgba(201,168,76,.3);color:var(--gold)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){.sidebar{display:none}.stats-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.content{padding:18px}.topbar{padding:0 16px}.cards-grid{grid-template-columns:1fr}.modal{padding:24px 20px}.form-row{grid-template-columns:1fr}.detail-stats{flex-wrap:wrap}.student-table{display:block;overflow-x:auto}}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--surface);border-top:1px solid var(--border);padding:8px 0 12px;gap:0}
@media(max-width:900px){.mobile-nav{display:flex}}
.mnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--dim);font-size:10px;font-weight:600;letter-spacing:.5px;padding:6px 4px;cursor:pointer;transition:color var(--tr)}
.mnav-item.active{color:var(--gold)}
.mnav-item .mi{font-size:20px}
@media(max-width:900px){.content{padding-bottom:80px}}
</style>
</head>
<body>
<div id="app-loading"><div class="spin"></div><p>Мэдээллийн сан ачааллаж байна...</p></div>
<div id="auth-screen" class="auth-wrap" style="display:none">
  <div class="auth-card">
    <div class="auth-brand"><span class="auth-brand-icon">⛳</span><h1>Golf Academy</h1><p>Мэргэжлийн гольфын сургалт</p></div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')">Нэвтрэх</button>
      <button class="auth-tab" onclick="switchAuth('register')">Бүртгүүлэх</button>
    </div>
    <div id="auth-err" class="err-box"></div>
    <div id="auth-ok" class="ok-box"></div>
    <div id="auth-form"></div>
  </div>
</div>
<div id="app" class="app">
  <div class="topbar">
    <div class="topbar-brand" onclick="navigate('dashboard')"><span class="topbar-brand-icon">⛳</span><span class="topbar-brand-name">Golf Academy</span></div>
    <div class="topbar-right"><span class="topbar-name" id="tb-name"></span><span class="badge" id="tb-badge"></span><button class="btn-logout" onclick="doLogout()">Гарах</button></div>
  </div>
  <div class="layout"><nav class="sidebar" id="sidebar"></nav><div class="content" id="content"></div></div>
  <nav class="mobile-nav" id="mobile-nav"></nav>
</div>
<div id="modal-root"></div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// SUPABASE INIT
// ══════════════════════════════════════════════════
const SB_URL = 'https://clakwvyobnzsupshbblb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsYWt3dnlvYm56c3Vwc2hiYmxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NTYzODUsImV4cCI6MjA5NDQzMjM4NX0.xyhplIjDtbX8ef9fbxuQe2UJDwCyCWawHfYlpjmZ2LA';
const sb = supabase.createClient(SB_URL, SB_KEY);

// EmailJS
emailjs.init('vbR09akjvBMhCwiSy');

// ══════════════════════════════════════════════════
// SUPABASE API
// ══════════════════════════════════════════════════
async function dbGetUsers()       { const {data}=await sb.from('users').select('*'); return data||[]; }
async function dbGetUser(id)      { const {data}=await sb.from('users').select('*').eq('id',id).single(); return data; }
async function dbUpsertUser(u)    { await sb.from('users').upsert(u); }
async function dbDeleteUser(id)   { await sb.from('users').delete().eq('id',id); }

async function dbGetContracts()   { const {data}=await sb.from('contracts').select('*'); return data||[]; }
async function dbUpsertContract(c){ await sb.from('contracts').upsert(c); }
async function dbDeleteContract(id){ await sb.from('contracts').delete().eq('id',id); }
async function dbDeleteContractsByStudent(sid){ await sb.from('contracts').delete().eq('student_id',sid); }

async function dbGetLessons()     { const {data}=await sb.from('lessons').select('*'); return data||[]; }
async function dbUpsertLesson(l)  { await sb.from('lessons').upsert(l); }
async function dbDeleteLessonsByStudent(sid){ await sb.from('lessons').delete().eq('student_id',sid); }

async function dbGetSession()     { const {data}=await sb.from('sessions').select('*').eq('key','current').single(); return data?data.user_id:null; }
async function dbSetSession(uid)  { await sb.from('sessions').upsert({key:'current',user_id:uid}); }
async function dbClearSession()   { await sb.from('sessions').delete().eq('key','current'); }

// ══════════════════════════════════════════════════
// CACHE
// ══════════════════════════════════════════════════
let CACHE = {users:[],contracts:[],lessons:[]};
async function refreshCache(){
  const [u,c,l] = await Promise.all([dbGetUsers(),dbGetContracts(),dbGetLessons()]);
  CACHE.users=u; CACHE.contracts=c; CACHE.lessons=l;
}

// ══════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════
function uid()    { return '_'+Math.random().toString(36).slice(2,11); }
function genCode(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }
function today()  { return new Date().toISOString().split('T')[0]; }
function daysLater(n){ return new Date(Date.now()+n*864e5).toISOString().split('T')[0]; }
function daysLeft(d) { return Math.max(0,Math.ceil((new Date(d)-Date.now())/864e5)); }
function fmtDate(d)  { if(!d)return'—'; const dt=new Date(d); return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`; }
function getUser(id) { return CACHE.users.find(u=>u.id===id); }
let _sid=null;
function cu(){ return getUser(_sid); }
function students(cid){ return CACHE.users.filter(u=>u.role==='student'&&u.coach_id===cid); }
function myContracts(){ const u=cu(); return u.role==='coach'?CACHE.contracts.filter(c=>c.coach_id===u.id):CACHE.contracts.filter(c=>c.student_id===u.id); }
function myLessons()  { const u=cu(); return u.role==='coach'?CACHE.lessons.filter(l=>l.coach_id===u.id):CACHE.lessons.filter(l=>l.student_id===u.id); }
const SMAP={active:'Идэвхтэй',completed:'Дууссан',cancelled:'Цуцлагдсан'};
const SCOL={active:'#4ade80',completed:'#60a5fa',cancelled:'#f87171'};

let _tt;
function toast(msg,type='ok'){ const t=document.getElementById('toast'); t.textContent=(type==='ok'?'✓ ':type==='err'?'✕ ':'ℹ ')+msg; t.className=`show t-${type}`; clearTimeout(_tt); _tt=setTimeout(()=>t.className='',3000); }
function showModal(html){ document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="closeModalOut(event)">${html}</div>`; }
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
function closeModalOut(e){ if(e.target.classList.contains('overlay'))closeModal(); }

let authMode='login';
const _otpStore={};

function switchAuth(mode){ authMode=mode; document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&mode==='login')||(i===1&&mode==='register'))); hideAuthMsg(); renderAuthForm(); }
function hideAuthMsg(){ document.getElementById('auth-err').classList.remove('show'); document.getElementById('auth-ok').classList.remove('show'); }
function showAuthErr(m){ const e=document.getElementById('auth-err'); e.textContent=m; e.classList.add('show'); document.getElementById('auth-ok').classList.remove('show'); }

function renderAuthForm(){
  const f=document.getElementById('auth-form');
  if(authMode==='login'){
    f.innerHTML=`
      <div class="field"><label>И-мэйл</label><input id="le" type="email" placeholder="example@golf.mn"/></div>
      <div class="field"><label>Нууц үг</label><input id="lp" type="password" placeholder="••••••••"/></div>
      <button class="btn-auth" onclick="doLogin()">Нэвтрэх →</button>
      <div class="auth-switch">Бүртгэлгүй юу? <a onclick="switchAuth('register')">Бүртгүүлэх</a></div>`;
  } else {
    f.innerHTML=`
      <div class="field"><label>Нэр</label><input id="rn" type="text" placeholder="Таны бүтэн нэр"/></div>
      <div class="field"><label>И-мэйл</label><input id="re" type="email" placeholder="example@golf.mn"/></div>
      <div class="field"><label>Нууц үг</label><input id="rp" type="password" placeholder="Дор хаяж 6 тэмдэгт"/></div>
      <div class="field"><label>Та хэн бэ?</label>
        <div class="role-btns">
          <div class="role-btn sel" id="rb-coach" onclick="selRole('coach')"><div class="role-icon">🏌️</div><div class="role-name">Багш</div></div>
          <div class="role-btn" id="rb-student" onclick="selRole('student')"><div class="role-icon">🎓</div><div class="role-name">Сурагч</div></div>
        </div>
      </div>
      <div id="invite-field" style="display:none">
        <div class="field"><label>Багшийн урилгын код</label><input id="rc" type="text" placeholder="Жишээ: AB12CD" style="text-transform:uppercase"/></div>
      </div>
      <button class="btn-auth" id="reg-btn" onclick="doRegister()">Бүртгүүлэх →</button>
      <div class="auth-switch">Бүртгэлтэй юу? <a onclick="switchAuth('login')">Нэвтрэх</a></div>`;

let selRoleVal='coach';
function selRole(r){ selRoleVal=r; document.getElementById('rb-coach').classList.toggle('sel',r==='coach'); document.getElementById('rb-student').classList.toggle('sel',r==='student'); document.getElementById('invite-field').style.display=r==='student'?'block':'none'; }

async function doLogin(){
  const email=document.getElementById('le').value.trim();
  const pass=document.getElementById('lp').value;
  const u=CACHE.users.find(x=>x.email===email&&x.password===pass);
  if(!u){ showAuthErr('И-мэйл эсвэл нууц үг буруу байна.'); return; }
  await dbSetSession(u.id); _sid=u.id; launchApp(u);
}

async function doRegister(){
  const name=document.getElementById('rn').value.trim();
  const email=document.getElementById('re').value.trim();
  const pass=document.getElementById('rp').value;
  if(!name||!email||!pass){ showAuthErr('Бүх талбарыг бөглөнө үү.'); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ showAuthErr('И-мэйл хаяг буруу байна.'); return; }
  if(pass.length<6){ showAuthErr('Нууц үг дор хаяж 6 тэмдэгт байх ёстой.'); return; }
  if(CACHE.users.find(u=>u.email===email)){ showAuthErr('Энэ и-мэйл бүртгэлтэй байна.'); return; }
  let coachId=null;
  if(selRoleVal==='student'){
    const code=(document.getElementById('rc').value||'').trim().toUpperCase();
    if(!code){ showAuthErr('Багшийн урилгын кодыг оруулна уу.'); return; }
    const coach=CACHE.users.find(u=>u.role==='coach'&&u.invite_code===code);
    if(!coach){ showAuthErr('Урилгын код буруу байна.'); return; }
    coachId=coach.id;
  }
  const btn=document.getElementById('reg-btn');
  btn.disabled=true; btn.textContent='Код илгээж байна...';
  const otp=String(Math.floor(100000+Math.random()*900000));
  const newUser={id:uid(),name,email,password:pass,role:selRoleVal,created_at:today(),verified:false};
  if(selRoleVal==='coach') newUser.invite_code=genCode();
  if(coachId) newUser.coach_id=coachId;
  _otpStore[email]={code:otp,userData:newUser,expires:Date.now()+10*60*1000};
  try {
    await emailjs.send('service_eyobm6k','template_t8n95kn',{to_name:name,to_email:email,otp_code:otp});
    showOtpPrompt(email);
  } catch(err){
    showAuthErr('И-мэйл илгээхэд алдаа гарлаа: '+JSON.stringify(err));
  }
  btn.disabled=false; btn.textContent='Бүртгүүлэх →';
}

function showOtpPrompt(email){
  const f=document.getElementById('auth-form');
  f.innerHTML=`
    <div style="background:var(--grd);border:1px solid rgba(74,222,128,.25);border-radius:12px;padding:16px;margin-bottom:20px;font-size:13px;color:var(--green);line-height:1.6">
      📧 <strong>${email}</strong> хаяг руу баталгаажуулах код илгээгдлээ.<br>
      <span style="color:var(--dim);font-size:12px">Spam/Junk хавтсаа мөн шалгаарай.</span>
    </div>
    <div class="field"><label>Баталгаажуулах код (6 оронтой)</label>
      <input id="otp-in" type="text" maxlength="6" placeholder="000000" style="letter-spacing:6px;font-size:22px;text-align:center;font-family:monospace"/>
    </div>
    <button class="btn-auth" onclick="doVerifyOtp('${email}')">✓ Баталгаажуулах</button>
    <div class="auth-switch"><a onclick="switchAuth('register')">← Буцах</a></div>`;
  document.getElementById('otp-in').focus();
}

async function doVerifyOtp(email){
  const entered=(document.getElementById('otp-in').value||'').trim();
  const rec=_otpStore[email];
  if(!rec||Date.now()>rec.expires){ showAuthErr('Код хугацаа дууссан. Дахин бүртгүүлнэ үү.'); switchAuth('register'); return; }
  if(entered!==rec.code){ showAuthErr('Код буруу байна. Дахин оролдоно уу.'); return; }
  delete _otpStore[email];
  const newUser={...rec.userData,verified:true};
  await dbUpsertUser(newUser);
  CACHE.users.push(newUser);
  await dbSetSession(newUser.id); _sid=newUser.id;
  launchApp(newUser);
}

let page='dashboard', subData={};

function launchApp(user){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').classList.add('active');
  document.getElementById('tb-name').textContent=user.name;
  const b=document.getElementById('tb-badge');
  b.textContent=user.role==='coach'?'Багш':'Сурагч';
  b.className='badge '+(user.role==='coach'?'badge-coach':'badge-student');
  navigate('dashboard');
}

async function doLogout(){ await dbClearSession(); _sid=null; document.getElementById('app').classList.remove('active'); document.getElementById('auth-screen').style.display='flex'; authMode='login'; renderAuthForm(); }

function navigate(pg,data={}){ page=pg; subData=data; renderSidebar(); renderMobileNav(); renderPage(); }

function navItems(){
  const u=cu();
  if(u.role==='coach') return [{id:'dashboard',icon:'📊',label:'Хяналт самбар'},{id:'students',icon:'👥',label:'Сурагчид'},{id:'contracts',icon:'📋',label:'Гэрээнүүд'},{id:'progress',icon:'📈',label:'Хичээлийн явц'},{id:'lessons',icon:'📚',label:'Хичээлийн бүртгэл'},{id:'invite',icon:'🔗',label:'Урилгын код'}];
  return [{id:'dashboard',icon:'📊',label:'Хяналт самбар'},{id:'contracts',icon:'📋',label:'Гэрээнүүд'},{id:'progress',icon:'📈',label:'Хичээлийн явц'},{id:'lessons',icon:'📚',label:'Хичээлийн бүртгэл'}];
}

function renderSidebar(){ document.getElementById('sidebar').innerHTML=navItems().map(i=>`<button class="nav-item ${page===i.id?'active':''}" onclick="navigate('${i.id}')"><span class="nav-icon">${i.icon}</span>${i.label}</button>`).join(''); }
function renderMobileNav(){ document.getElementById('mobile-nav').innerHTML=navItems().map(i=>`<button class="mnav-item ${page===i.id?'active':''}" onclick="navigate('${i.id}')"><span class="mi">${i.icon}</span>${i.label}</button>`).join(''); }

function renderPage(){
  const u=cu(), cont=document.getElementById('content');
  cont.innerHTML='';
  if(page==='dashboard') cont.innerHTML=renderDashboard();
  else if(page==='students'&&u.role==='coach'){ if(subData.studentId) cont.innerHTML=renderStudentDetail(subData.studentId); else cont.innerHTML=renderStudents(); }
  else if(page==='contracts') cont.innerHTML=renderContracts();
  else if(page==='progress') cont.innerHTML=renderProgress();
  else if(page==='lessons') cont.innerHTML=renderLessonsPage();
  else if(page==='invite'&&u.role==='coach') cont.innerHTML=renderInvite();
}

function sc(v,l,d){ return `<div class="stat-card" style="animation-delay:${d}ms"><div class="stat-val">${v}</div><div class="stat-label">${l}</div></div>`; }

function renderDashboard(){
  const u=cu();
  if(u.role==='coach'){
    const ss=students(u.id), cs=CACHE.contracts.filter(c=>c.coach_id===u.id), ls=CACHE.lessons.filter(l=>l.coach_id===u.id);
    const rate=ls.length?Math.round(ls.filter(l=>l.status==='present').length/ls.length*100):0;
    const wk=ls.filter(l=>(Date.now()-new Date(l.date))/864e5<=7).length;
    return `<div class="stats-row">${sc(ss.length,'Сурагчид',0)}${sc(cs.filter(c=>c.status==='active').length,'Идэвхтэй гэрээ',60)}${sc(wk,'7 хоногийн хичээл',120)}${sc(rate+'%','Ирцийн хувь',180)}</div>
      <div class="page-hdr"><div><h2>Сүүлийн хичээлүүд</h2></div></div>
      <div class="lesson-list">${ls.length?[...ls].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6).map((l,i)=>lessonRowHTML(l,i,true)).join(''):emptyHTML('Хичээл бүртгэгдээгүй')}</div>`;
  } else {
    const cs=CACHE.contracts.filter(c=>c.student_id===u.id), ls=CACHE.lessons.filter(l=>l.student_id===u.id);
    const rate=ls.length?Math.round(ls.filter(l=>l.status==='present').length/ls.length*100):0;
    const coach=getUser(u.coach_id);
    return `${coach?`<div style="background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:24px;display:flex;align-items:center;gap:14px"><span style="font-size:32px">🏌️</span><div><div style="font-size:12px;color:var(--dim)">Таны багш</div><div style="font-size:17px;font-weight:600;margin-top:2px">${coach.name}</div></div></div>`:''}
      <div class="stats-row">${sc(cs.filter(c=>c.status==='active').length,'Идэвхтэй гэрээ',0)}${sc(ls.length,'Нийт хичээл',60)}${sc(ls.filter(l=>l.status==='present').length,'Ирсэн',120)}${sc(rate+'%','Ирцийн хувь',180)}</div>
      <div class="page-hdr"><div><h2>Сүүлийн хичээлүүд</h2></div></div>
      <div class="lesson-list">${ls.length?[...ls].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6).map((l,i)=>lessonRowHTML(l,i,false)).join(''):emptyHTML('Хичээл бүртгэгдээгүй')}</div>`;
  }
}

function renderContracts(){

  const addBtn=u.role==='coach'?`<button class="btn btn-primary" onclick="openAddContract()">＋ Гэрээ нэмэх</button>`:'';
  return `<div class="page-hdr"><div><h2>Гэрээнүүд</h2><p>${filtered.length} гэрээ</p></div>${addBtn}</div><div class="filter-bar">${chips}</div>${filtered.length?`<div class="cards-grid">${filtered.map((c,i)=>contractCardHTML(c,i)).join('')}</div>`:emptyHTML('Гэрээ олдсонгүй')}`;

function contractCardHTML(c,idx=0){
  const student=getUser(c.student_id), left=daysLeft(c.end_date), pct=c.max_lessons?Math.round(c.completed_lessons/c.max_lessons*100):0;
  const col=SCOL[c.status]||'#4ade80', leftCol=c.status==='active'?(left<10?'var(--red)':'var(--green)'):'var(--dim)';
  const u=cu();
  const actions=u.role==='coach'&&c.status==='active'?`<div class="cc-actions"><button class="btn btn-sm btn-danger" onclick="confirmCancel('${c.id}')">Цуцлах</button><button class="btn btn-sm btn-ghost" onclick="openEditContract('${c.id}')">✏️ Засах</button></div>`:'';
  return `<div class="contract-card" style="animation-delay:${idx*55}ms">
    <div class="cc-hdr"><div><div class="cc-lbl">гэрээ</div><div class="cc-name">${student?student.name:'—'}</div>${u.role==='coach'?'':`<div class="cc-sub">Багш: ${getUser(c.coach_id)?.name||'—'}</div>`}</div><span class="status-pill" style="background:${col}22;color:${col}">${SMAP[c.status]}</span></div>
    <div class="cc-body"><div class="info-grid">
      <div><div class="info-label">Эхлэх огноо</div><div class="info-val">${fmtDate(c.start_date)}</div></div>
      <div><div class="info-label">Дуусах огноо</div><div class="info-val">${fmtDate(c.end_date)}</div></div>
      <div><div class="info-label">Хичээлийн тоо</div><div class="info-val">${c.completed_lessons} / ${c.max_lessons}</div></div>
      <div><div class="info-label">Үлдсэн хоног</div><div class="info-val" style="color:${leftCol}">${c.status==='active'?left+' өдөр':'—'}</div></div>
    </div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="prog-labels"><span>Явц: ${pct}%</span><span>${c.completed_lessons} хичээл дууслаа</span></div>${actions}</div></div>`;
}

function renderStudents(){
  const u=cu(), ss=students(u.id);
  if(!ss.length) return `<div class="page-hdr"><div><h2>Сурагчид</h2></div></div><div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:32px;margin-bottom:24px">${renderInviteBox(u)}</div>${emptyHTML('Одоогоор сурагч бүртгэгдээгүй байна.')}`;
  const rows=ss.map((s,i)=>{
    const sc=CACHE.contracts.filter(c=>c.student_id===s.id), sl=CACHE.lessons.filter(l=>l.student_id===s.id);
    const pr=sl.length?Math.round(sl.filter(l=>l.status==='present').length/sl.length*100):0;
    return `<tr style="animation-delay:${i*50}ms" onclick="navigate('students',{studentId:'${s.id}'})">
      <td><div style="display:flex;align-items:center;gap:12px"><div class="s-avatar">${s.name[0]}</div><div><div style="font-size:15px;font-weight:600">${s.name}</div><div style="font-size:12px;color:var(--dim)">${s.email}</div></div></div></td>
      <td style="text-align:center"><span style="font-family:var(--fd);font-size:20px;color:var(--gold)">${sc.filter(c=>c.status==='active').length}</span></td>
      <td style="text-align:center"><span style="font-family:var(--fd);font-size:20px;color:var(--gold)">${sl.length}</span></td>
      <td style="text-align:center"><span style="font-family:var(--fd);font-size:20px;color:${pr>=80?'var(--green)':pr>=60?'var(--gold)':'var(--red)'}">${pr}%</span></td>
      <td><button class="btn btn-sm btn-danger" onclick="event.stopPropagation();confirmDeleteStudent('${s.id}')">Устгах</button></td>
    </tr>`;
  }).join('');
  return `<div class="page-hdr"><div><h2>Сурагчид</h2><p>${ss.length} сурагч</p></div></div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;margin-bottom:24px">${renderInviteBox(u)}</div>
    <table class="student-table"><thead><tr><th>Сурагч</th><th style="text-align:center">Гэрээ</th><th style="text-align:center">Хичээл</th><th style="text-align:center">Ирц</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderInviteBox(u){
  return `<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
    <div><div style="font-size:12px;color:var(--dim);margin-bottom:8px">Сурагч нэмэх урилгын код</div>
    <div style="font-family:monospace;font-size:30px;color:var(--gold);letter-spacing:5px;font-weight:700">${u.invite_code}</div>
    <div style="font-size:12px;color:var(--dim);margin-top:6px">Сурагч бүртгүүлэхдээ энэ кодыг ашиглана</div></div>
    <div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" onclick="copyCode('${u.invite_code}')">📋 Хуулах</button><button class="btn btn-ghost btn-sm" onclick="regenCode()">🔄 Шинэчлэх</button></div>
  </div>`;
}

function copyCode(code){ navigator.clipboard.writeText(code).then(()=>toast('Код хуулагдлаа','info')).catch(()=>toast('Код хуулагдлаа','info')); }
async function regenCode(){ const u=cu(); u.invite_code=genCode(); await dbUpsertUser(u); const i=CACHE.users.findIndex(x=>x.id===u.id); if(i>=0)CACHE.users[i]=u; toast('Шинэ код үүслээ','ok'); navigate('students'); }

function renderStudentDetail(sid){
  const s=getUser(sid); if(!s) return emptyHTML('Сурагч олдсонгүй');
  const u=cu(), sc=CACHE.contracts.filter(c=>c.student_id===sid), sl=CACHE.lessons.filter(l=>l.student_id===sid&&l.coach_id===u.id);
  const present=sl.filter(l=>l.status==='present').length, rate=sl.length?Math.round(present/sl.length*100):0;
  return `<div class="detail-back" onclick="navigate('students')">← Сурагчид руу буцах</div>
    <div class="detail-panel">
      <div class="detail-profile"><div class="detail-avatar">${s.name[0]}</div><div class="detail-info"><h3>${s.name}</h3><p>${s.email}</p><p style="margin-top:6px;font-size:12px;color:var(--dim)">Бүртгүүлсэн: ${fmtDate(s.created_at)}</p></div></div>
      <div class="detail-stats">
        <div class="ds-item"><div class="ds-val">${sc.filter(c=>c.status==='active').length}</div><div class="ds-lbl">ИДЭВХТЭЙ ГЭРЭЭ</div></div>
        <div class="ds-item"><div class="ds-val">${sl.length}</div><div class="ds-lbl">НИЙТ ХИЧЭЭЛ</div></div>
        <div class="ds-item"><div class="ds-val">${present}</div><div class="ds-lbl">ИРСЭН</div></div>
        <div class="ds-item"><div class="ds-val" style="color:${rate>=80?'var(--green)':rate>=60?'var(--gold)':'var(--red)'}">${rate}%</div><div class="ds-lbl">ИРЦ</div></div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="openAddLesson('${sid}')">＋ Хичээл бүртгэх</button>
        <button class="btn btn-ghost btn-sm" onclick="openAddContract('${sid}')">＋ Гэрээ нэмэх</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteStudent('${sid}')">Сурагч устгах</button>
      </div>
      <div style="margin-bottom:16px"><h3 style="font-family:var(--fd);font-size:18px">Гэрээнүүд</h3></div>
      ${sc.length?`<div class="cards-grid" style="margin-bottom:28px">${sc.map((c,i)=>contractCardHTML(c,i)).join('')}</div>`:emptyHTML('Гэрээ байхгүй')}
      <div style="margin-bottom:16px"><h3 style="font-family:var(--fd);font-size:18px">Хичээлийн бүртгэл</h3></div>
      ${sl.length?`<div class="lesson-list">${[...sl].sort((a,b)=>new Date(b.date)-new Date(a.date)).map((l,i)=>lessonRowHTML(l,i,false)).join('')}</div>`:emptyHTML('Хичээл байхгүй')}
    </div>`;
}

function renderInvite(){
  const u=cu();
  return `<div class="page-hdr"><div><h2>Урилгын код</h2><p>Сурагчдыг нэмэх</p></div></div>
    <div class="detail-panel" style="max-width:500px">
      <p style="color:var(--mid);margin-bottom:24px;font-size:14px;line-height:1.7">Сурагч бүртгүүлэхдээ <strong style="color:var(--gold)">Сурагч</strong> гэж сонгоод, доорх кодыг оруулна.</p>
      <div style="background:var(--bg);border:2px dashed rgba(201,168,76,.3);border-radius:16px;padding:32px;text-align:center;margin-bottom:24px">
        <div style="font-size:13px;color:var(--dim);margin-bottom:12px">ТАНЫ УРИЛГЫН КОД</div>
        <div style="font-family:monospace;font-size:42px;color:var(--gold);letter-spacing:8px;font-weight:700">${u.invite_code}</div>
      </div>
      <div style="display:flex;gap:10px"><button class="btn btn-primary" onclick="copyCode('${u.invite_code}')">📋 Код хуулах</button><button class="btn btn-ghost" onclick="regenCode()">🔄 Шинэ код үүсгэх</button></div>
    </div>`;
}

function openAddContract(preStudentId=''){
  const u=cu(), ss=students(u.id);
  if(!ss.length){ toast('Эхлээд сурагч нэмнэ үү','err'); return; }
  const opts=ss.map(s=>`<option value="${s.id}" ${s.id===preStudentId?'selected':''}>${s.name}</option>`).join('');
  showModal(`<div class="modal"><h2>✦ Шинэ гэрээ нэмэх</h2>
    <div class="field"><label>Сурагч</label><select id="fc-s">${opts}</select></div>
    <div class="form-row"><div class="field"><label>Эхлэх огноо</label><input type="date" id="fc-sd" value="${today()}"/></div><div class="field"><label>Дуусах огноо</label><input type="date" id="fc-ed" value="${daysLater(90)}"/></div></div>
    <div class="field"><label>Нийт хичээлийн тоо</label><input type="number" id="fc-ml" min="1" max="500" value="20"/></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Болих</button><button class="btn btn-primary" onclick="doAddContract()">Нэмэх</button></div>
  </div>`);
}

async function doAddContract(){
  const u=cu(), sid=document.getElementById('fc-s').value, sd=document.getElementById('fc-sd').value, ed=document.getElementById('fc-ed').value, ml=parseInt(document.getElementById('fc-ml').value)||20;
  if(!sd||!ed){ toast('Огноо оруулна уу','err'); return; }
  if(new Date(ed)<=new Date(sd)){ toast('Дуусах огноо буруу','err'); return; }
  const c={id:uid(),coach_id:u.id,student_id:sid,status:'active',start_date:sd,end_date:ed,completed_lessons:0,max_lessons:ml,created_at:today()};
  await dbUpsertContract(c); CACHE.contracts.unshift(c);
  closeModal(); toast('Гэрээ нэмэгдлээ','ok'); navigate(page);
}

function openEditContract(cid){
  const c=CACHE.contracts.find(x=>x.id===cid); if(!c)return;
  showModal(`<div class="modal"><h2>✏️ Гэрээ засах</h2>
    <div class="form-row"><div class="field"><label>Эхлэх огноо</label><input type="date" id="ec-sd" value="${c.start_date}"/></div><div class="field"><label>Дуусах огноо</label><input type="date" id="ec-ed" value="${c.end_date}"/></div></div>
    <div class="field"><label>Нийт хичээлийн тоо</label><input type="number" id="ec-ml" min="1" max="500" value="${c.max_lessons}"/></div>
    <div class="field"><label>Дууссан хичээл</label><input type="number" id="ec-cl" min="0" value="${c.completed_lessons}"/></div>
    <div class="field"><label>Төлөв</label><select id="ec-st"><option value="active" ${c.status==='active'?'selected':''}>Идэвхтэй</option><option value="completed" ${c.status==='completed'?'selected':''}>Дууссан</option><option value="cancelled" ${c.status==='cancelled'?'selected':''}>Цуцлагдсан</option></select></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Болих</button><button class="btn btn-primary" onclick="doEditContract('${cid}')">Хадгалах</button></div>
  </div>`);
}

async function doEditContract(cid){
  const i=CACHE.contracts.findIndex(x=>x.id===cid); if(i<0)return;
  Object.assign(CACHE.contracts[i],{start_date:document.getElementById('ec-sd').value,end_date:document.getElementById('ec-ed').value,max_lessons:parseInt(document.getElementById('ec-ml').value)||1,completed_lessons:parseInt(document.getElementById('ec-cl').value)||0,status:document.getElementById('ec-st').value});
  await dbUpsertContract(CACHE.contracts[i]); closeModal(); toast('Гэрээ засагдлаа','ok'); navigate(page);
}

function confirmCancel(cid){ showModal(`<div class="modal confirm-modal"><div class="confirm-icon">⚠️</div><h2 style="margin-bottom:12px">Гэрээ цуцлах уу?</h2><p>Энэ үйлдлийг буцааж болохгүй.</p><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Болих</button><button class="btn btn-danger" onclick="doCancel('${cid}')">Тийм, цуцлах</button></div></div>`); }

async function doCancel(cid){ const i=CACHE.contracts.findIndex(x=>x.id===cid); if(i>=0){CACHE.contracts[i].status='cancelled'; await dbUpsertContract(CACHE.contracts[i]);} closeModal(); toast('Гэрээ цуцлагдлаа','ok'); navigate(page); }

function openAddLesson(preStudentId=''){
  const u=cu(), ss=students(u.id);
  if(!ss.length){ toast('Эхлээд сурагч нэмнэ үү','err'); return; }
  const opts=ss.map(s=>`<option value="${s.id}" ${s.id===preStudentId?'selected':''}>${s.name}</option>`).join('');
  showModal(`<div class="modal"><h2>📚 Хичээл бүртгэх</h2>
    <div class="field"><label>Сурагч</label><select id="fl-s">${opts}</select></div>
    <div class="form-row"><div class="field"><label>Огноо</label><input type="date" id="fl-d" value="${today()}"/></div><div class="field"><label>Ирц</label><select id="fl-st"><option value="present">✓ Ирсэн</option><option value="absent">✕ Ирээгүй</option></select></div></div>
    <div class="field"><label>Хичээлийн сэдэв</label><input type="text" id="fl-t" placeholder="Drive техник, Putting..."/></div>
    <div class="field"><label>Тэмдэглэл (заавал биш)</label><input type="text" id="fl-n" placeholder="Нэмэлт мэдээлэл..."/></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Болих</button><button class="btn btn-primary" onclick="doAddLesson()">Бүртгэх</button></div>
  </div>`);
}

async function doAddLesson(){
  const u=cu(), sid=document.getElementById('fl-s').value, date=document.getElementById('fl-d').value, status=document.getElementById('fl-st').value, topic=document.getElementById('fl-t').value.trim(), notes=document.getElementById('fl-n').value.trim();
  if(!topic){ toast('Хичээлийн сэдвийг оруулна уу','err'); return; }
  const l={id:uid(),coach_id:u.id,student_id:sid,date,status,topic,notes};
  await dbUpsertLesson(l); CACHE.lessons.unshift(l);
  if(status==='present'){ const ac=CACHE.contracts.find(c=>c.student_id===sid&&c.coach_id===u.id&&c.status==='active'); if(ac){ac.completed_lessons=Math.min(ac.completed_lessons+1,ac.max_lessons); await dbUpsertContract(ac);} }
  closeModal(); toast('Хичээл бүртгэгдлээ','ok'); navigate(page);
}

function confirmDeleteStudent(sid){ const s=getUser(sid); showModal(`<div class="modal confirm-modal"><div class="confirm-icon">🗑️</div><h2 style="margin-bottom:12px">Сурагч устгах уу?</h2><p><strong style="color:var(--red)">${s?s.name:''}</strong></p><p>Гэрээ болон хичээлийн бүртгэл мөн устана.</p><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Болих</button><button class="btn btn-danger" onclick="doDeleteStudent('${sid}')">Устгах</button></div></div>`); }

async function doDeleteStudent(sid){
  await Promise.all([dbDeleteUser(sid),dbDeleteContractsByStudent(sid),dbDeleteLessonsByStudent(sid)]);
  CACHE.users=CACHE.users.filter(u=>u.id!==sid); CACHE.contracts=CACHE.contracts.filter(c=>c.student_id!==sid); CACHE.lessons=CACHE.lessons.filter(l=>l.student_id!==sid);
  closeModal(); toast('Сурагч устгагдлаа','ok');
  if(subData.studentId===sid) navigate('students'); else navigate(page);
}

function emptyHTML(text){ return `<div class="empty"><div class="empty-icon">⛳</div><div class="empty-text">${text.replace(/\n/g,'<br>')}</div></div>`; }

async function init(){
  try {
    await refreshCache();
    _sid=await dbGetSession();
    document.getElementById('app-loading').style.display='none';
    if(_sid&&getUser(_sid)){
      const u=getUser(_sid);
      document.getElementById('tb-name').textContent=u.name;
      const b=document.getElementById('tb-badge');
      b.textContent=u.role==='coach'?'Багш':'Сурагч';
      b.className='badge '+(u.role==='coach'?'badge-coach':'badge-student');
      document.getElementById('app').classList.add('active');
      navigate('dashboard');
    } else {
      document.getElementById('auth-screen').style.display='flex';
      renderAuthForm();
    }
  } catch(err){
    console.error(err);
    document.getElementById('app-loading').innerHTML=`<div style="color:#f87171;text-align:center;padding:24px"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div>Алдаа гарлаа. Хуудсыг дахин ачаална уу.</div></div>`;
  }
}
init();
</script>
</body>
</html>
