<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Golf Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09100c;--surface:#111c14;--s2:#162019;--s3:#1d2a20;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --gold:#c9a84c;--gl:#e4c96a;--gd:rgba(201,168,76,0.14);
  --green:#4ade80;--grd:rgba(74,222,128,0.12);
  --red:#f87171;--rdd:rgba(248,113,113,0.12);
  --blue:#60a5fa;--bld:rgba(96,165,250,0.12);
  --text:#e4e8e0;--dim:#6b7d6e;--mid:#9aab9d;
  --fd:'Playfair Display',serif;--fb:'DM Sans',sans-serif;
  --r:14px;--r2:20px;--tr:.2s cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);font-size:15px;line-height:1.5;overflow-x:hidden}
input,select,button,textarea{font-family:var(--fb)}
button{cursor:pointer}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* LOADING */
#app-loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
#app-loading .spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
#app-loading p{color:var(--dim);font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTH SCREENS */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 90% 55% at 50% 0%,#1b3d28,#09100c 65%);padding:24px}
.auth-card{background:var(--surface);border:1px solid var(--border2);border-radius:28px;
  padding:48px 42px;width:100%;max-width:460px;box-shadow:0 40px 100px rgba(0,0,0,.65);
  animation:fadeUp .5s ease both}
.auth-brand{text-align:center;margin-bottom:36px}
.auth-brand-icon{font-size:48px;display:block;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(201,168,76,.4))}
.auth-brand h1{font-family:var(--fd);font-size:28px;color:var(--gold)}
.auth-brand p{color:var(--dim);font-size:13px;margin-top:5px}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:12px;padding:5px;margin-bottom:28px}
.auth-tab{flex:1;background:transparent;border:none;color:var(--dim);font-size:14px;font-weight:500;
  padding:9px;border-radius:8px;transition:all var(--tr)}
.auth-tab.active{background:var(--surface);color:var(--text);font-weight:600;
  box-shadow:0 2px 8px rgba(0,0,0,.3)}
.err-box{background:var(--rdd);border:1px solid rgba(248,113,113,.25);color:var(--red);
  border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;text-align:center}
.err-box.show{display:block}
.ok-box{background:var(--grd);border:1px solid rgba(74,222,128,.25);color:var(--green);
  border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;text-align:center}
.ok-box.show{display:block}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:var(--dim);margin-bottom:8px}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border2);
  border-radius:10px;padding:13px 16px;color:var(--text);font-size:15px;outline:none;
  transition:border-color var(--tr)}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field select option{background:var(--surface)}
.role-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.role-btn{background:var(--bg);border:2px solid var(--border);border-radius:12px;
  padding:16px;text-align:center;cursor:pointer;transition:all var(--tr);color:var(--dim)}
.role-btn.sel{border-color:var(--gold);background:var(--gd);color:var(--gold)}
.role-btn .role-icon{font-size:28px;margin-bottom:6px}
.role-btn .role-name{font-size:13px;font-weight:600}
.btn-auth{width:100%;background:linear-gradient(135deg,var(--gold),var(--gl));
  color:#08100b;font-weight:700;font-size:15px;border:none;border-radius:11px;
  padding:15px;letter-spacing:.4px;transition:all var(--tr);
  box-shadow:0 4px 24px rgba(201,168,76,.3);margin-top:8px}
.btn-auth:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,168,76,.4)}
.btn-auth:disabled{opacity:.6;transform:none;cursor:not-allowed}
.auth-switch{text-align:center;margin-top:22px;font-size:13px;color:var(--dim)}
.auth-switch a{color:var(--gold);cursor:pointer;text-decoration:underline}

/* APP SHELL */
.app{display:none;min-height:100vh;flex-direction:column}
.app.active{display:flex}

/* SIDEBAR */
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:24px 16px;gap:4px;
  position:sticky;top:66px;height:calc(100vh - 66px);overflow-y:auto}
.sidebar-section{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--dim);padding:14px 12px 8px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;
  cursor:pointer;color:var(--mid);font-size:14px;font-weight:500;transition:all var(--tr);border:none;
  background:transparent;width:100%;text-align:left}
.nav-item:hover{background:var(--s2);color:var(--text)}
.nav-item.active{background:var(--gd);color:var(--gold);font-weight:600}
.nav-item .nav-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}

/* TOPBAR */
.topbar{height:66px;background:rgba(9,16,12,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;
  animation:slideDown .4s ease}
.topbar-brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.topbar-brand-icon{font-size:22px;filter:drop-shadow(0 0 8px rgba(201,168,76,.5))}
.topbar-brand-name{font-family:var(--fd);font-size:19px;color:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-name{font-size:14px;font-weight:500;color:var(--mid)}
.badge{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;letter-spacing:.4px}
.badge-coach{background:rgba(201,168,76,.18);color:var(--gold)}
.badge-student{background:var(--grd);color:var(--green)}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--dim);
  border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;transition:all var(--tr)}
.btn-logout:hover{border-color:var(--red);color:var(--red);background:var(--rdd)}

/* MAIN */
.content{flex:1;padding:32px;overflow-y:auto;min-width:0}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);
  padding:24px 20px;text-align:center;position:relative;overflow:hidden;
  transition:transform var(--tr),border-color var(--tr);animation:fadeUp .4s ease both}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
.stat-card:hover{transform:translateY(-3px);border-color:rgba(201,168,76,.25)}
.stat-val{font-family:var(--fd);font-size:36px;font-weight:700;color:var(--gold);line-height:1}
.stat-label{font-size:12px;color:var(--dim);margin-top:6px;font-weight:500}

/* PAGE HEADER */
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.page-hdr h2{font-family:var(--fd);font-size:24px}
.page-hdr p{font-size:13px;color:var(--dim);margin-top:3px}

/* BUTTONS */
.btn{border:none;border-radius:10px;cursor:pointer;font-weight:600;font-size:14px;
  padding:11px 20px;transition:all var(--tr);display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gl));color:#08100b;
  box-shadow:0 4px 16px rgba(201,168,76,.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(201,168,76,.35)}
.btn-danger{background:var(--rdd);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.btn-danger:hover{background:rgba(248,113,113,.2)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--dim)}
.btn-ghost:hover{border-color:var(--mid);color:var(--text)}
.btn-sm{font-size:12px;padding:7px 14px;border-radius:8px}

/* FILTER */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.fchip{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:7px 15px;font-size:13px;cursor:pointer;color:var(--dim);transition:all var(--tr)}
.fchip.active{border-color:var(--gold);color:var(--gold);background:var(--gd)}
.fchip:hover:not(.active){color:var(--text);border-color:var(--border2)}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}

/* CONTRACT / PROGRESS CARD */
.contract-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);
  overflow:hidden;transition:transform var(--tr),box-shadow var(--tr),border-color var(--tr);
  animation:fadeUp .35s ease both}
.contract-card:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.45);
  border-color:rgba(201,168,76,.2)}
.cc-hdr{display:flex;align-items:flex-start;justify-content:space-between;
  padding:20px 20px 16px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,var(--s2),var(--surface))}
.cc-lbl{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.cc-name{font-family:var(--fd);font-size:18px;line-height:1.2}
.cc-sub{font-size:12px;color:var(--dim);margin-top:3px}
.status-pill{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;
  letter-spacing:.3px;white-space:nowrap;margin-top:2px}
.cc-body{padding:20px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.info-label{font-size:11px;color:var(--dim);margin-bottom:4px;letter-spacing:.4px}
.info-val{font-size:15px;font-weight:600}
.prog-track{background:rgba(255,255,255,.07);border-radius:99px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gl));
  transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-labels{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--dim)}
.cc-actions{display:flex;gap:8px;margin-top:14px}

/* LESSON LIST */
.lesson-list{display:flex;flex-direction:column;gap:10px}
.lesson-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:15px 20px;display:flex;align-items:center;gap:14px;
  transition:border-color var(--tr);animation:fadeUp .3s ease both}
.lesson-row:hover{border-color:rgba(201,168,76,.2)}
.lesson-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lesson-date{font-size:13px;color:var(--dim);min-width:96px;font-weight:500}
.lesson-info{flex:1;min-width:0}
.lesson-topic{font-size:15px;font-weight:500}
.lesson-note{font-size:12px;color:var(--dim);margin-top:2px}
.lesson-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.att-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.att-p{background:var(--grd);color:var(--green)}
.att-a{background:var(--rdd);color:var(--red)}
.stag{font-size:11px;color:var(--dim)}

/* STUDENT TABLE */
.student-table{width:100%;border-collapse:separate;border-spacing:0 8px}
.student-table thead th{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--dim);padding:0 16px 8px;text-align:left}
.student-table tbody tr{background:var(--surface);border-radius:12px;
  transition:all var(--tr);cursor:pointer;animation:fadeUp .3s ease both}
.student-table tbody td{padding:16px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.student-table tbody td:first-child{border-left:1px solid var(--border);border-radius:12px 0 0 12px}
.student-table tbody td:last-child{border-right:1px solid var(--border);border-radius:0 12px 12px 0}
.student-table tbody tr:hover td{border-color:rgba(201,168,76,.2)}
.s-avatar{width:40px;height:40px;border-radius:10px;background:var(--grd);
  display:flex;align-items:center;justify-content:center;font-family:var(--fd);
  font-size:17px;color:var(--green);font-weight:700;border:1px solid rgba(74,222,128,.2)}

/* DETAIL PANEL */
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:28px}
.detail-back{display:flex;align-items:center;gap:8px;color:var(--dim);cursor:pointer;
  font-size:13px;margin-bottom:24px;transition:color var(--tr)}
.detail-back:hover{color:var(--gold)}
.detail-profile{display:flex;align-items:center;gap:20px;margin-bottom:28px;
  padding-bottom:24px;border-bottom:1px solid var(--border)}
.detail-avatar{width:64px;height:64px;border-radius:16px;background:var(--grd);
  display:flex;align-items:center;justify-content:center;font-family:var(--fd);
  font-size:28px;color:var(--green);font-weight:700;border:2px solid rgba(74,222,128,.2);flex-shrink:0}
.detail-info h3{font-family:var(--fd);font-size:22px}
.detail-info p{font-size:13px;color:var(--dim);margin-top:4px}
.detail-stats{display:flex;gap:24px;margin-bottom:28px}
.ds-item{background:var(--s2);border:1px solid var(--border);border-radius:12px;
  padding:16px 22px;text-align:center;flex:1}
.ds-val{font-family:var(--fd);font-size:28px;color:var(--gold);line-height:1}
.ds-lbl{font-size:11px;color:var(--dim);margin-top:4px}

/* EMPTY */
.empty{text-align:center;padding:60px 24px;color:var(--dim)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-text{font-size:15px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);
  z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;
  animation:fadeIn .2s ease}
.modal{background:var(--surface);border:1px solid rgba(201,168,76,.2);border-radius:22px;
  padding:34px 34px 30px;width:100%;max-width:500px;animation:fadeUp .3s ease;
  max-height:90vh;overflow-y:auto}
.modal h2{font-family:var(--fd);font-size:22px;color:var(--gold);margin-bottom:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-actions{display:flex;gap:10px;margin-top:26px}
.modal-actions .btn{flex:1;justify-content:center}
.confirm-modal{max-width:380px;text-align:center}
.confirm-modal .confirm-icon{font-size:44px;margin-bottom:16px}
.confirm-modal p{color:var(--mid);font-size:14px;margin-bottom:6px}

/* TOAST */
#toast{position:fixed;bottom:28px;right:28px;z-index:999;
  background:var(--surface);border:1px solid var(--border2);border-radius:12px;
  padding:13px 20px;font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.5);
  display:none;max-width:320px}
#toast.show{display:block;animation:slideUp .3s ease}
#toast.t-ok{border-color:rgba(74,222,128,.3);color:var(--green)}
#toast.t-err{border-color:rgba(248,113,113,.3);color:var(--red)}
#toast.t-info{border-color:rgba(201,168,76,.3);color:var(--gold)}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{display:none}
  .stats-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  .content{padding:18px}
  .topbar{padding:0 16px}
  .cards-grid{grid-template-columns:1fr}
  .modal{padding:24px 20px}
  .form-row{grid-template-columns:1fr}
  .detail-stats{flex-wrap:wrap}
  .student-table{display:block;overflow-x:auto}
}

/* MOBILE NAV */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:90;
  background:var(--surface);border-top:1px solid var(--border);
  padding:8px 0 12px;gap:0}
@media(max-width:900px){.mobile-nav{display:flex}}
.mnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--dim);font-size:10px;font-weight:600;
  letter-spacing:.5px;padding:6px 4px;cursor:pointer;transition:color var(--tr)}
.mnav-item.active{color:var(--gold)}
.mnav-item .mi{font-size:20px}
@media(max-width:900px){.content{padding-bottom:80px}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="app-loading">
  <div class="spin"></div>
  <p>Мэдээллийн сан ачааллаж байна...</p>
</div>

<!-- AUTH -->
<div id="auth-screen" class="auth-wrap" style="display:none">
  <div class="auth-card" id="auth-card">
    <div class="auth-brand">
      <span class="auth-brand-icon">⛳</span>
      <h1>Golf Academy</h1>
      <p>Мэргэжлийн гольфын сургалт</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')">Нэвтрэх</button>
      <button class="auth-tab" onclick="switchAuth('register')">Бүртгүүлэх</button>
    </div>
    <div id="auth-err" class="err-box"></div>
    <div id="auth-ok" class="ok-box"></div>
    <div id="auth-form"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">
  <div class="topbar">
    <div class="topbar-brand" onclick="navigate('dashboard')">
      <span class="topbar-brand-icon">⛳</span>
      <span class="topbar-brand-name">Golf Academy</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-name" id="tb-name"></span>
      <span class="badge" id="tb-badge"></span>
      <button class="btn-logout" onclick="doLogout()">Гарах</button>
    </div>
  </div>
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="content" id="content"></div>
  </div>
  <nav class="mobile-nav" id="mobile-nav"></nav>
</div>

<div id="modal-root"></div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// IndexedDB BACKEND LAYER
// Энэ layer нь бодит REST API-г дуурайдаг.
// Хожим Node.js/Express сервертэй солиход зөвхөн
// энэ хэсгийг fetch() дуудлагаар солино.
// ══════════════════════════════════════════════════
const DB_NAME = 'GolfAcademyDB';
const DB_VER  = 1;
let _idb = null;

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('users'))
        db.createObjectStore('users', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('contracts'))
        db.createObjectStore('contracts', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('lessons'))
        db.createObjectStore('lessons', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('session'))
        db.createObjectStore('session', { keyPath: 'key' });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

function idbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx  = _idb.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}
function idbGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx  = _idb.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}
function idbPut(store, obj) {
  return new Promise((resolve, reject) => {
    const tx  = _idb.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(obj);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}
function idbDelete(store, key) {
  return new Promise((resolve, reject) => {
    const tx  = _idb.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}

emailjs.init('vbR09akjvBMhCwiSy');

// OTP store: email -> {code, userData}
const _otpStore = {};

async function doRegister() {
  const name  = document.getElementById('rn').value.trim();
  const email = document.getElementById('re').value.trim();
  const pass  = document.getElementById('rp').value;
  if(!name||!email||!pass){ showAuthErr('Бүх талбарыг бөглөнө үү.'); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ showAuthErr('И-мэйл хаяг буруу байна.'); return; }
  if(pass.length<6){ showAuthErr('Нууц үг дор хаяж 6 тэмдэгт байх ёстой.'); return; }
  if(CACHE.users.find(u=>u.email===email)){ showAuthErr('Энэ и-мэйл бүртгэлтэй байна.'); return; }
  let coachId = null;
  if(selRoleVal==='student'){
    const code = (document.getElementById('rc').value||'').trim().toUpperCase();
    if(!code){ showAuthErr('Багшийн урилгын кодыг оруулна уу.'); return; }
    const coach = CACHE.users.find(u=>u.role==='coach'&&u.inviteCode===code);
    if(!coach){ showAuthErr('Урилгын код буруу байна. Багшаасаа асуугтун.'); return; }
    coachId = coach.id;
  }
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Код илгээж байна...';

  // Generate 6-digit OTP
  const otp = String(Math.floor(100000 + Math.random() * 900000));
  const newUser = { id:uid(), name, email, password:pass, role:selRoleVal, createdAt:today(), verified:false };
  if(selRoleVal==='coach') newUser.inviteCode = genCode();
  if(coachId) newUser.coachId = coachId;
  _otpStore[email] = { code: otp, userData: newUser, expires: Date.now() + 10*60*1000 };

  // EmailJS-ээр бодит мэйл илгээнэ
  try {
    await emailjs.send('service_eyobm6k', 't8n95kn', {
      to_name: name,
      to_email: email,
      otp_code: otp,
    });
    showOtpPrompt(email);
  } catch(err) {
    showAuthErr('И-мэйл илгээхэд алдаа гарлаа: ' + JSON.stringify(err));
    console.error(err);
  }
  btn.disabled = false; btn.textContent = 'Бүртгүүлэх →';
}

function showOtpPrompt(email) {
  const f = document.getElementById('auth-form');
  f.innerHTML = `
    <div style="background:var(--grd);border:1px solid rgba(74,222,128,.25);border-radius:12px;padding:16px;margin-bottom:20px;font-size:13px;color:var(--green);line-height:1.6">
      📧 <strong>${email}</strong> хаяг руу баталгаажуулах код илгээгдлээ.<br>
      <span style="color:var(--dim);font-size:12px">Spam/Junk хавтсаа мөн шалгаарай.</span>
    </div>
    <div class="field"><label>Баталгаажуулах код (6 оронтой)</label>
      <input id="otp-in" type="text" maxlength="6" placeholder="000000" style="letter-spacing:6px;font-size:22px;text-align:center;font-family:monospace"/>
    </div>
    <button class="btn-auth" onclick="doVerifyOtp('${email}')">✓ Баталгаажуулах</button>
    <div class="auth-switch"><a onclick="switchAuth('register')">← Буцах</a></div>`;
  document.getElementById('otp-in').focus();
}

async function doVerifyOtp(email) {
  const entered = (document.getElementById('otp-in').value||'').trim();
  const rec = _otpStore[email];
  if(!rec){ showAuthErr('Код хугацаа дууссан. Дахин бүртгүүлнэ үү.'); switchAuth('register'); return; }
  if(Date.now() > rec.expires){ showAuthErr('Код хугацаа дууссан (10 мин). Дахин бүртгүүлнэ үү.'); switchAuth('register'); return; }
  if(entered !== rec.code){ showAuthErr('Код буруу байна. Дахин оролдоно уу.'); return; }
  delete _otpStore[email];
  const newUser = { ...rec.userData, verified: true };
  await apiCreateUser(newUser);
  CACHE.users.push(newUser);
  await apiSetSession(newUser.id);
  _sessionUserId = newUser.id;
  launchApp(newUser);
}

    filterHTML = `<div class="filter-bar">
      <button class="fchip ${pFilter==='all'?'active':''}" onclick="setPF('all')">Бүгд</button>
      ${students_list.map(s=>`<button class="fchip ${pFilter===s.id?'active':''}" onclick="setPF('${s.id}')">${s.name.split(' ')[0]}</button>`).join('')}

  }
  const addBtn = u.role==='coach' ? `<button class="btn btn-primary" onclick="openAddContract()">＋ Гэрээ нэмэх</button>` : '';
  const cards = filtered.length
    ? `<div class="cards-grid">${filtered.map((c,i)=>progressCardHTML(c,i)).join('')}</div>`

  return `
    <div class="page-hdr"><div><h2>Хичээлийн явц</h2><p>${filtered.length} бүртгэл</p></div>${addBtn}</div>

}
function setPF(f){ pFilter=f; navigate('progress'); }

function progressCardHTML(c,idx=0){
  const student = getUser(c.studentId);
  const ls      = CACHE.lessons.filter(l=>l.studentId===c.studentId&&l.coachId===c.coachId);
  const present = ls.filter(l=>l.status==='present').length;
  const absent  = ls.filter(l=>l.status==='absent').length;
  const rate    = ls.length ? Math.round(present/ls.length*100) : 0;
  const pct     = c.maxLessons ? Math.round(c.completedLessons/c.maxLessons*100) : 0;
  const col     = SCOL[c.status]||'#4ade80';
  const u = cu();
  const actions = u.role==='coach' && c.status==='active' ? `
    <div class="cc-actions">
      <button class="btn btn-sm btn-ghost" onclick="openAddLesson('${c.studentId}')">＋ Хичээл бүртгэх</button>
    </div>` : '';
  return `
    <div class="contract-card" style="animation-delay:${idx*55}ms">
      <div class="cc-hdr">
        <div>
          <div class="cc-lbl">хичээлийн явц</div>
          <div class="cc-name">${student?student.name:'—'}</div>
        </div>
        <span class="status-pill" style="background:${col}22;color:${col}">${SMAP[c.status]}</span>
      </div>
      <div class="cc-body">
        <div class="info-grid">
          <div><div class="info-label">Нийт хичээл</div><div class="info-val">${ls.length}</div></div>
          <div><div class="info-label">Ирцийн хувь</div><div class="info-val" style="color:${rate>=80?'var(--green)':rate>=60?'var(--gold)':'var(--red)'}">${rate}%</div></div>
          <div><div class="info-label">Ирсэн</div><div class="info-val" style="color:var(--green)">${present}</div></div>
          <div><div class="info-label">Ирээгүй</div><div class="info-val" style="color:var(--red)">${absent}</div></div>
        </div>
        <div style="margin-bottom:6px"><div class="info-label">Гэрээний явц</div></div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>

      </div>
    </div>`;
}

function renderInviteBox(u){
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
      <div>
        <div style="font-size:12px;color:var(--dim);margin-bottom:8px">Сурагч нэмэх урилгын код</div>
        <div style="font-family:monospace;font-size:30px;color:var(--gold);letter-spacing:5px;font-weight:700">${u.inviteCode}</div>
        <div style="font-size:12px;color:var(--dim);margin-top:6px">Сурагч бүртгүүлэхдээ энэ кодыг ашиглана</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="copyCode('${u.inviteCode}')">📋 Хуулах</button>
        <button class="btn btn-ghost btn-sm" onclick="regenCode()">🔄 Шинэчлэх</button>
      </div>
    </div>`;
}

function copyCode(code){
  navigator.clipboard.writeText(code)
    .then(()=>toast('Код хуулагдлаа','info'))
    .catch(()=>{
      const ta=document.createElement('textarea');
      ta.value=code; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      toast('Код хуулагдлаа','info');
    });
}

async function regenCode(){
  const u = cu();
  u.inviteCode = genCode();
  await apiUpdateUser(u);
  const i = CACHE.users.findIndex(x=>x.id===u.id);
  if(i>=0) CACHE.users[i] = u;
  toast('Шинэ код үүслээ','ok'); navigate('students');
}

function openAddContract(preStudentId=''){
  const u  = cu();
  const ss = students(u.id);
  const opts = ss.map(s=>`<option value="${s.id}" ${s.id===preStudentId?'selected':''}>${s.name}</option>`).join('');
  if(!ss.length){ toast('Эхлээд сурагч нэмнэ үү','err'); return; }
  showModal(`
    <div class="modal">
      <h2>✦ Шинэ гэрээ нэмэх</h2>
      <div class="field"><label>Сурагч</label><select id="fc-s">${opts}</select></div>
      <div class="form-row">
        <div class="field"><label>Эхлэх огноо</label><input type="date" id="fc-sd" value="${today()}"/></div>
        <div class="field"><label>Дуусах огноо</label><input type="date" id="fc-ed" value="${daysLater(90)}"/></div>
      </div>
      <div class="field"><label>Нийт хичээлийн тоо</label><input type="number" id="fc-ml" min="1" max="500" value="20"/></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Болих</button>
        <button class="btn btn-primary" onclick="doAddContract()">Нэмэх</button>
      </div>
    </div>`);
}

async function doAddContract(){
  const u   = cu();
  const sid = document.getElementById('fc-s').value;
  const sd  = document.getElementById('fc-sd').value;
  const ed  = document.getElementById('fc-ed').value;
  const ml  = parseInt(document.getElementById('fc-ml').value)||20;
  if(!sd||!ed){ toast('Огноо оруулна уу','err'); return; }
  if(new Date(ed)<=new Date(sd)){ toast('Дуусах огноо буруу','err'); return; }
  const c = { id:uid(), coachId:u.id, studentId:sid, status:'active',
               startDate:sd, endDate:ed, completedLessons:0, maxLessons:ml, createdAt:today() };
  await apiCreateContract(c);
  CACHE.contracts.unshift(c);
  closeModal(); toast('Гэрээ нэмэгдлээ','ok'); navigate(page);
}

function openEditContract(cid){
  const c = CACHE.contracts.find(x=>x.id===cid);
  if(!c) return;
  showModal(`
    <div class="modal">
      <h2>✏️ Гэрээ засах</h2>
      <div class="form-row">
        <div class="field"><label>Эхлэх огноо</label><input type="date" id="ec-sd" value="${c.startDate}"/></div>
        <div class="field"><label>Дуусах огноо</label><input type="date" id="ec-ed" value="${c.endDate}"/></div>
      </div>
      <div class="field"><label>Нийт хичээлийн тоо</label><input type="number" id="ec-ml" min="1" max="500" value="${c.maxLessons}"/></div>
      <div class="field"><label>Дууссан хичээл</label><input type="number" id="ec-cl" min="0" value="${c.completedLessons}"/></div>
      <div class="field"><label>Төлөв</label>
        <select id="ec-st">
          <option value="active" ${c.status==='active'?'selected':''}>Идэвхтэй</option>
          <option value="completed" ${c.status==='completed'?'selected':''}>Дууссан</option>
          <option value="cancelled" ${c.status==='cancelled'?'selected':''}>Цуцлагдсан</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Болих</button>
        <button class="btn btn-primary" onclick="doEditContract('${cid}')">Хадгалах</button>
      </div>
    </div>`);
}

async function doEditContract(cid){
  const i = CACHE.contracts.findIndex(x=>x.id===cid);
  if(i<0) return;
  CACHE.contracts[i].startDate       = document.getElementById('ec-sd').value;
  CACHE.contracts[i].endDate         = document.getElementById('ec-ed').value;
  CACHE.contracts[i].maxLessons      = parseInt(document.getElementById('ec-ml').value)||1;
  CACHE.contracts[i].completedLessons= parseInt(document.getElementById('ec-cl').value)||0;
  CACHE.contracts[i].status          = document.getElementById('ec-st').value;
  await apiUpdateContract(CACHE.contracts[i]);
  closeModal(); toast('Гэрээ засагдлаа','ok'); navigate(page);
}

function confirmCancel(cid){
  showModal(`
    <div class="modal confirm-modal">
      <div class="confirm-icon">⚠️</div>
      <h2 style="margin-bottom:12px">Гэрээ цуцлах уу?</h2>
      <p>Энэ үйлдлийг буцааж болохгүй.</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Болих</button>
        <button class="btn btn-danger" onclick="doCancel('${cid}')">Тийм, цуцлах</button>
      </div>
    </div>`);
}

async function doCancel(cid){
  const i = CACHE.contracts.findIndex(x=>x.id===cid);
  if(i>=0){
    CACHE.contracts[i].status = 'cancelled';
    await apiUpdateContract(CACHE.contracts[i]);
  }
  closeModal(); toast('Гэрээ цуцлагдлаа','ok'); navigate(page);
}

// ══════════════════════════════════════════════════
function openAddLesson(preStudentId=''){
  const u  = cu();
  const ss = students(u.id);
  const opts = ss.map(s=>`<option value="${s.id}" ${s.id===preStudentId?'selected':''}>${s.name}</option>`).join('');
  if(!ss.length){ toast('Эхлээд сурагч нэмнэ үү','err'); return; }
  showModal(`
    <div class="modal">
      <h2>📚 Хичээл бүртгэх</h2>
      <div class="field"><label>Сурагч</label><select id="fl-s">${opts}</select></div>
      <div class="form-row">
        <div class="field"><label>Огноо</label><input type="date" id="fl-d" value="${today()}"/></div>
        <div class="field"><label>Ирц</label>
          <select id="fl-st">
            <option value="present">✓ Ирсэн</option>
            <option value="absent">✕ Ирээгүй</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Хичээлийн сэдэв</label><input type="text" id="fl-t" placeholder="Drive техник, Putting..."/></div>
      <div class="field"><label>Тэмдэглэл (заавал биш)</label><input type="text" id="fl-n" placeholder="Нэмэлт мэдээлэл..."/></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Болих</button>
        <button class="btn btn-primary" onclick="doAddLesson()">Бүртгэх</button>
      </div>
    </div>`);
}

async function doAddLesson(){
  const u      = cu();
  const sid    = document.getElementById('fl-s').value;
  const date   = document.getElementById('fl-d').value;
  const status = document.getElementById('fl-st').value;
  const topic  = document.getElementById('fl-t').value.trim();
  const notes  = document.getElementById('fl-n').value.trim();
  if(!topic){ toast('Хичээлийн сэдвийг оруулна уу','err'); return; }
  const l = { id:uid(), coachId:u.id, studentId:sid, date, status, topic, notes };
  await apiCreateLesson(l);
  CACHE.lessons.unshift(l);
  if(status==='present'){
    const ac = CACHE.contracts.find(c=>c.studentId===sid&&c.coachId===u.id&&c.status==='active');
    if(ac){
      ac.completedLessons = Math.min(ac.completedLessons+1, ac.maxLessons);
      await apiUpdateContract(ac);
    }
  }
  closeModal(); toast('Хичээл бүртгэгдлээ','ok'); navigate(page);
}

}

async function doDeleteStudent(sid){
  await apiDeleteUser(sid);
  await apiDeleteContractsByStudent(sid);
  await apiDeleteLessonsByStudent(sid);
  CACHE.users      = CACHE.users.filter(u=>u.id!==sid);
  CACHE.contracts  = CACHE.contracts.filter(c=>c.studentId!==sid);
  CACHE.lessons    = CACHE.lessons.filter(l=>l.studentId!==sid);
  closeModal(); toast('Сурагч устгагдлаа','ok');
  if(subData.studentId===sid) navigate('students');
  else navigate(page);
}

function emptyHTML(text){
  return `<div class="empty"><div class="empty-icon">⛳</div><div class="empty-text">${text.replace(/\n/g,'<br>')}</div></div>`;
}

// ══════════════════════════════════════════════════
// INIT — IndexedDB нээж, cache дүүргэж, session шалгана
// ══════════════════════════════════════════════════
async function init(){
  try {
    _idb = await openIDB();
    await refreshCache();
    _sessionUserId = await apiGetSession();
    document.getElementById('app-loading').style.display = 'none';
    if(_sessionUserId && getUser(_sessionUserId)){
      const u = getUser(_sessionUserId);
      document.getElementById('tb-name').textContent = u.name;
      const b = document.getElementById('tb-badge');
      b.textContent = u.role==='coach' ? 'Багш' : 'Сурагч';
      b.className = 'badge ' + (u.role==='coach' ? 'badge-coach' : 'badge-student');
      document.getElementById('app').classList.add('active');
      navigate('dashboard');
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
      renderAuthForm();
    }
  } catch(err) {
    console.error('DB init error:', err);
    document.getElementById('app-loading').innerHTML =
      `<div style="color:#f87171;text-align:center;padding:24px">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <div>Мэдээллийн сан ачаалахад алдаа гарлаа.<br>Хуудсыг дахин ачаална уу.</div>
      </div>`;
  }
}

init();
</script>
